services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev -- --hostname 0.0.0.0 --port 3000"
    env_file:
      - ./serenamoon/.env
    ports:
      - "3000:3000"
    volumes:
      - ./serenamoon:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm start:dev"
    env_file:
      - ./serenamoon-api/.env
    ports:
      - "8080:8080"
    volumes:
      - ./serenamoon-api:/app
      - backend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
  backend_node_modules:
